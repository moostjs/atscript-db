packages:
  - packages/*
  - docs

catalog:
  "@atscript/core": ^0.1.50
  "@atscript/typescript": ^0.1.50
  "@types/node": ^24
  "@moostjs/event-http": ^0.6.8
  moost: ^0.6.8
  "@uniqu/core": ^0.1.5
  "@uniqu/url": ^0.1.5
  unplugin-atscript: ^0.1.50
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@0.1.12
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
  ignoreMissing:
    - "@prostojs/logger"
    - "@prostojs/router"
